name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos
            platform: macos-latest
            go_targets: |
              GOOS=darwin GOARCH=arm64 go build -o desktop/src-tauri/binaries/nj-server-aarch64-apple-darwin ./cmd/server
              GOOS=darwin GOARCH=amd64 go build -o desktop/src-tauri/binaries/nj-server-x86_64-apple-darwin ./cmd/server
            tauri_args: '--target aarch64-apple-darwin'
            extra_mac_intel: true
          - id: linux
            platform: ubuntu-22.04
            go_targets: |
              GOOS=linux GOARCH=amd64 go build -o desktop/src-tauri/binaries/nj-server-x86_64-unknown-linux-gnu ./cmd/server
            tauri_args: ''
            extra_mac_intel: false
          - id: windows
            platform: windows-latest
            go_targets: |
              GOOS=windows GOARCH=amd64 go build -o desktop/src-tauri/binaries/nj-server-x86_64-pc-windows-msvc.exe ./cmd/server
            tauri_args: ''
            extra_mac_intel: false

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.id == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cross-compile Go server
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          ${{ matrix.go_targets }}

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Build Tauri (primary target)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Neural Junkie ${{ github.ref_name }}'
          releaseBody: |
            ## Install Neural Junkie

            Pick the installer for your platform:

            | Platform | File |
            |----------|------|
            | **macOS (Apple Silicon)** | `.dmg` with `aarch64` in the name |
            | **macOS (Intel)** | `.dmg` with `x64` or `x86_64` in the name |
            | **Windows** | `.msi` installer (or `.exe` setup) |
            | **Linux** | `.AppImage` and/or `.deb` |

            **macOS:** Unsigned build — if Gatekeeper blocks the app, right-click → **Open**, or allow in **System Settings → Privacy & Security**.

            **Windows:** Install [Ollama](https://ollama.com) manually or use a cloud API key in the setup wizard (in-app Ollama install is macOS/Linux only).

            **Quick start:** [docs/DOWNLOAD.md](https://github.com/camronwood/neural-junkie/blob/main/docs/DOWNLOAD.md)

            **From source:** [README Quick Start](https://github.com/camronwood/neural-junkie#quick-start)
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          tauriScript: npx tauri
          args: ${{ matrix.tauri_args }}

      - name: Build Tauri (Intel macOS)
        if: matrix.extra_mac_intel
        working-directory: desktop
        run: npx tauri build --target x86_64-apple-darwin

      - name: Upload Intel macOS bundles
        if: matrix.extra_mac_intel
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz
          )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No Intel macOS bundles found" >&2
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${assets[@]}" --repo "${{ github.repository }}" --clobber

  generate-manifests:
    needs: build
    if: ${{ !contains(github.ref_name, 'beta') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate update manifests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/generate-update-manifests.sh
          scripts/generate-update-manifests.sh ${{ github.ref_name }}

      - name: Upload manifests to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            update-darwin-aarch64.json
            update-darwin-x86_64.json
            update-linux-x86_64.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
