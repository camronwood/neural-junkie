name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            go_targets: |
              GOOS=darwin GOARCH=arm64 go build -o desktop/src-tauri/binaries/nj-server-aarch64-apple-darwin ./cmd/server
              GOOS=darwin GOARCH=amd64 go build -o desktop/src-tauri/binaries/nj-server-x86_64-apple-darwin ./cmd/server
            tauri_args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            go_targets: |
              GOOS=darwin GOARCH=amd64 go build -o desktop/src-tauri/binaries/nj-server-x86_64-apple-darwin ./cmd/server
              GOOS=darwin GOARCH=arm64 go build -o desktop/src-tauri/binaries/nj-server-aarch64-apple-darwin ./cmd/server
            tauri_args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            go_targets: |
              GOOS=linux GOARCH=amd64 go build -o desktop/src-tauri/binaries/nj-server-x86_64-unknown-linux-gnu ./cmd/server
            tauri_args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cross-compile Go server
        run: |
          mkdir -p desktop/src-tauri/binaries
          ${{ matrix.go_targets }}

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Neural Junkie ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
          args: ${{ matrix.tauri_args }}

  generate-manifests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate update manifests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/generate-update-manifests.sh
          scripts/generate-update-manifests.sh ${{ github.ref_name }}

      - name: Upload manifests to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            update-darwin-aarch64.json
            update-darwin-x86_64.json
            update-linux-x86_64.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
