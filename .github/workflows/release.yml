name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Neural Junkie ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          draft: true
          make_latest: false
          generate_release_notes: false
          body: |
            ## Install Neural Junkie

            Pick the installer for your platform:

            | Platform | File |
            |----------|------|
            | **macOS (Apple Silicon)** | `.dmg` with `aarch64` in the name |
            | **macOS (Intel)** | `.dmg` with `x64` or `x86_64` in the name |
            | **Windows** | `.msi` installer (or `.exe` setup) |
            | **Linux** | `.AppImage` and/or `.deb` |

            **macOS:** Unsigned build — if Gatekeeper blocks the app, right-click → **Open**, or allow in **System Settings → Privacy & Security**.

            **Windows:** Install [Ollama](https://ollama.com) manually or use a cloud API key in the setup wizard (in-app Ollama install is macOS/Linux only).

            **Quick start:** [docs/DOWNLOAD.md](https://github.com/camronwood/neural-junkie/blob/main/docs/DOWNLOAD.md)

            **From source:** [README Quick Start](https://github.com/camronwood/neural-junkie#quick-start)

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cross-compile Go server
        run: |
          mkdir -p desktop/src-tauri/binaries
          GOOS=darwin GOARCH=arm64 go build -o desktop/src-tauri/binaries/nj-server-aarch64-apple-darwin ./cmd/server
          GOOS=darwin GOARCH=amd64 go build -o desktop/src-tauri/binaries/nj-server-x86_64-apple-darwin ./cmd/server

      - name: Build frontend
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Build Tauri (Apple Silicon)
        working-directory: desktop
        run: npx tauri build --target aarch64-apple-darwin

      - name: Upload Apple Silicon assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          gh release upload "${{ github.ref_name }}" \
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg \
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz \
            --repo "${{ github.repository }}" --clobber

      - name: Build Tauri (Intel)
        working-directory: desktop
        run: npx tauri build --target x86_64-apple-darwin

      - name: Upload Intel macOS assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          gh release upload "${{ github.ref_name }}" \
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg \
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz \
            --repo "${{ github.repository }}" --clobber

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cross-compile Go server
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          GOOS=windows GOARCH=amd64 go build -o desktop/src-tauri/binaries/nj-server-x86_64-pc-windows-msvc.exe ./cmd/server

      - name: Build frontend and Tauri
        working-directory: desktop
        run: |
          npm ci
          npm run build
          npx tauri build

      - name: Upload Windows assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No Windows bundles found" >&2
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${assets[@]}" --repo "${{ github.repository }}" --clobber

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cross-compile Go server
        run: |
          mkdir -p desktop/src-tauri/binaries
          GOOS=linux GOARCH=amd64 go build -o desktop/src-tauri/binaries/nj-server-x86_64-unknown-linux-gnu ./cmd/server

      - name: Build frontend and Tauri
        working-directory: desktop
        run: |
          npm ci
          npm run build
          npx tauri build

      - name: Upload Linux assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No Linux bundles found" >&2
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${assets[@]}" --repo "${{ github.repository }}" --clobber

  publish-release:
    needs:
      - create-release
      - build-macos
      - build-windows
      - build-linux
    if: ${{ always() && needs.create-release.result == 'success' && (needs.build-macos.result == 'success' || needs.build-windows.result == 'success' || needs.build-linux.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (undraft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(--draft=false)
          if [[ "${{ github.ref_name }}" == *beta* ]]; then
            args+=(--prerelease)
          fi
          gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" "${args[@]}"
